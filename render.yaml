services:
  - type: web
    name: markov-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
  # All-in-one expected-move page — ES/NQ/YM/RTY ranked by how far each has
  # travelled vs its own daily EM (who's leading), with each market's daily
  # S/R levels and the paste-able daily/weekly/monthly EM numbers. Replaces
  # the old single-NQ page. (uvicorn four_em:app)
  - type: web
    name: four-market-em
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn four_em:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
