services:
  - type: web
    name: markov-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
  # NQ morning expected-move page — its own service / own URL, separate from
  # the dashboard. Open it each morning, read expMoveDaily, paste into the
  # indicator. (uvicorn em_web:app)
  - type: web
    name: nq-expected-move
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn em_web:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
